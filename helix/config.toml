theme = "pickles"

[editor]
line-number = "relative"
shell = ["fish", "-c"]

[editor.cursor-shape]
insert = "bar"

[editor.inline-diagnostics]
cursor-line = "hint"

[editor.lsp]
goto-reference-include-declaration = false

[editor.search]
smart-case = false

[editor.whitespace]
render.space = "all"
render.tab = "all"
render.nbsp = "none"
render.nnbsp = "none"
render.newline = "none"

[keys.normal]
C-l = "jump_view_right"
C-h = "jump_view_left"
C-j = "page_down"
C-k = "page_up"
C-b = ":buffer-close"
"C-\\" = "vsplit"
"C-/" = "toggle_comments"
S-ret = "insert_newline"
