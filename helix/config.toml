theme = "pickles"

[editor]
bufferline = "multiple"
color-modes = true
line-number = "relative"
rulers = [81]
shell = ["fish", "-c"]
trim-final-newlines = true
trim-trailing-whitespace = true

[editor.cursor-shape]
insert = "bar"
select = "underline"

[editor.inline-diagnostics]
cursor-line = "hint"

[editor.lsp]
auto-signature-help = false
goto-reference-include-declaration = false

[editor.search]
smart-case = false

[editor.statusline]
right = ["file-indent-style", "file-type", "diagnostics", "selections", "position"]

[editor.whitespace]
render.nbsp = "none"
render.newline = "none"
render.nnbsp = "none"
render.space = "all"
render.tab = "all"

[keys.normal]
"C-/" = "toggle_comments"
"C-?" = "toggle_block_comments"
C-S-r = ":reload-all"
C-S-s = ":write-all"
"C-\\" = "vsplit"
C-b = ":buffer-close"
C-d = ["select_mode", "search_selection"]
C-f = "save_selection"
C-j = "page_down"
C-k = "page_up"
C-r = ":reload"
C-s = ":write"
S-ret = "insert_newline"
S-tab = "jump_backward"
X = "extend_line_above"
# Word nav
A-h = "move_prev_sub_word_start"
A-l = "move_next_sub_word_end"
C-backspace = "delete_word_backward"
C-h = "move_prev_word_start"
C-l = "move_next_word_end"
# Pane nav
C-A-h = "jump_view_left"
C-A-j = "jump_view_down"
C-A-k = "jump_view_up"
C-A-l = "jump_view_right"
# Buffer nav
C-m = ":buffer-next"
C-n = ":buffer-previous"

[keys.select]
"C-/" = "toggle_comments"
"C-?" = "toggle_block_comments"
C-d = "search_selection"
# Word nav
A-h = "extend_prev_sub_word_start"
A-l = "extend_next_sub_word_end"
C-h = "extend_prev_word_start"
C-l = "extend_next_word_start"
# Pane nav
C-A-h = "jump_view_left"
C-A-j = "jump_view_down"
C-A-k = "jump_view_up"
C-A-l = "jump_view_right"

# Git actions
[keys.normal."`"]
# Commit commands echo to the status line because it forces helix to wait
# for it to finish before reloading
a = ":! git add ."
b = ":echo %sh{git blame -L %{cursor_line},+1 %{buffer_name}}"
c = [":echo %sh{git commit -am 'WIP'}", ":reload-all"]
d = ":! git diff"
n = [":echo %sh{git can -a}", ":reload-all"]
s = ":! git status"
t = ":! git todo"
